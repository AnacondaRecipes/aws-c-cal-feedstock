{% set name = "aws-c-cal" %}
{% set version = "0.9.13" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/awslabs/{{ name }}/archive/v{{ version }}.tar.gz
  sha256: 80b7c6087b0af461b4483e4c9483aea2e0dac5d9fb2289b057159ea6032409e1

build:
  number: 1
  run_exports:
    - {{ pin_subpackage("aws-c-cal", max_pin="x.x.x") }}

requirements:
  build:
    - {{ stdlib('c') }}
    - {{ compiler('c') }}
    - cmake >=3.9
    - ninja-base
  host:
    - aws-c-common 0.12.4
    - openssl {{ openssl }}  # [linux]

test:
  requires:
    # cmake needs compiler to be able to run package detection, see
    # https://discourse.cmake.org/t/questions-about-find-package-cli-msvc/6194
    - {{ compiler('c') }}
    - cmake
    - ninja
    - pkg-config
  files:
    - cmake_test/
  commands:
    - test -f $PREFIX/lib/libaws-c-cal${SHLIB_EXT}  # [unix]
    - test -f $PREFIX/include/aws/cal/cal.h  # [unix]
    - if not exist %LIBRARY_INC%\aws\cal\cal.h exit 1  # [win]
    - if not exist %LIBRARY_BIN%\aws-c-cal.dll exit 1  # [win]

    # CMake integration
    - cd cmake_test
    - cmake -GNinja $CMAKE_ARGS .   # [unix]
    - cmake -GNinja %CMAKE_ARGS% .  # [win]

about:
  home: https://github.com/awslabs/aws-c-cal
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  summary: Aws Crypto Abstraction Layer
  description: |
    AWS Crypto Abstraction Layer: Cross-Platform, C99 wrapper for cryptography primitives.
  dev_url: https://github.com/awslabs/aws-c-cal
  doc_url: https://github.com/awslabs/aws-c-cal

extra:
  recipe-maintainers:
    - xhochy
    - conda-forge/aws-sdk-cpp